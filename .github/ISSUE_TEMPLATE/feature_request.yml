name: Feature request
description: Suggest a gameplay, developer experience, or Stellar integration improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Gameplay polish
        - Soroban contract
        - Wallet UX
        - Docs / onboarding
        - Community / GrantFox
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What gap or friction are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Outline the feature and expected behavior.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Implementation notes
      description: Mention contracts, UI areas, or documentation that may need updates.
